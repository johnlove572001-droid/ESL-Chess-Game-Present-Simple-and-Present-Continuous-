<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Chess ESL Edition</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --board-dark: #b58863;
            --board-light: #f0d9b5;
            --p1-color: #ffffff;
            --p2-color: #000000;
        }

        body { font-family: sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; }
        #game-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        
        /* Board UI */
        #board { display: grid; grid-template-columns: repeat(8, 65px); grid-template-rows: repeat(8, 65px); border: 4px solid #333; }
        .square { width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .light { background-color: var(--board-light); }
        .dark { background-color: var(--board-dark); }
        .selected { background-color: #7b61ff !important; }
        .valid-move::after { content: ''; width: 18px; height: 18px; background: rgba(0,0,0,0.15); border-radius: 50%; }

        .piece { font-size: 45px; user-select: none; transition: transform 0.1s; z-index: 5; }
        .p1 { color: white; text-shadow: 0 0 4px black; }
        .p2 { color: black; }

        /* UI Panel */
        #ui-panel { width: 300px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .turn-box { padding: 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        .white-turn { background: #eee; color: #333; border: 2px solid #b58863; }
        .black-turn { background: #333; color: #fff; }

        /* Modal */
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        #modal { background: white; padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .choice-btn:hover { background: #f0f0f0; }
        #feedback { margin-top: 10px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>🏆 Full Chess: ESL Grammar</h1>

    <div id="game-container">
        <div id="board"></div>

        <div id="ui-panel">
            <div id="turn-display" class="turn-box white-turn">White's Turn</div>
            <p><strong>Goal:</strong> Capture the opponent's King!</p>
            <button onclick="initGame()" style="padding:10px 20px; cursor:pointer;">Restart Game</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal">
            <h3 id="q-text">Question</h3>
            <div id="choices"></div>
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        /**
         * ==========================================
         * TEACHER: EDIT QUESTIONS HERE
         * ==========================================
         */
        const QUESTIONS = [
            { q: "She ______ (study) for her exam right now.", c: ["studies", "is studying", "study"], a: 1 },
            { q: "We ______ (go) to the gym three times a week.", c: ["go", "are going", "goes"], a: 0 },
            { q: "Look! That bird ______ (fly) so high.", c: ["flies", "is flying", "fly"], a: 1 },
            { q: "I ______ (not/like) coffee.", c: ["don't like", "doesn't like", "am not liking"], a: 0 },
            { q: "______ your brother ______ (play) guitar?", c: ["Do / play", "Is / playing", "Does / play"], a: 2 },
            { q: "The moon ______ (revolve) around the Earth.", c: ["is revolving", "revolves", "revolve"], a: 1 },
            { q: "Listen! The teacher ______ (speak).", c: ["is speaking", "speaks", "speak"], a: 0 },
            { q: "They ______ (watch) a movie at the moment.", c: ["watch", "are watching", "watches"], a: 1 },
            { q: "I ______ (clean) my room every Saturday.", c: ["am cleaning", "clean", "cleans"], a: 1 },
            { q: "Why ______ you ______ (laugh)?", c: ["do / laugh", "are / laughing", "is / laughing"], a: 1 }
        ];

        // Piece Unicode Mapping
        const PIECES = {
            p1: { r: '♖', n: '♘', b: '♗', q: '♕', k: '♔', p: '♙' },
            p2: { r: '♜', n: '♞', b: '♝', q: '♛', k: '♚', p: '♟' }
        };

        let board = [];
        let turn = 1; // 1 = White, 2 = Black
        let selected = null;
        let moves = [];
        let pending = null;

        function initGame() {
            board = Array(8).fill(null).map(() => Array(8).fill(null));
            turn = 1; selected = null; moves = [];
            
            const layout = ['r','n','b','q','k','b','n','r'];
            for(let i=0; i<8; i++) {
                board[0][i] = { type: layout[i], player: 2 };
                board[1][i] = { type: 'p', player: 2 };
                board[6][i] = { type: 'p', player: 1 };
                board[7][i] = { type: layout[i], player: 1 };
            }
            render();
            updateUI();
        }

        function render() {
            const bEl = document.getElementById('board');
            bEl.innerHTML = '';
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r+c)%2===0 ? 'light' : 'dark'}`;
                    if(selected && selected.r === r && selected.c === c) sq.classList.add('selected');
                    if(moves.some(m => m.r === r && m.c === c)) sq.classList.add('valid-move');
                    
                    const p = board[r][c];
                    if(p) {
                        const pEl = document.createElement('div');
                        pEl.className = `piece p${p.player}`;
                        pEl.innerHTML = PIECES[`p${p.player}`][p.type];
                        sq.appendChild(pEl);
                    }
                    sq.onclick = () => handleClick(r, c);
                    bEl.appendChild(sq);
                }
            }
        }

        function handleClick(r, c) {
            const target = board[r][c];
            const move = moves.find(m => m.r === r && m.c === c);

            if(move) {
                pending = { from: selected, to: {r, c} };
                askQuestion();
                return;
            }

            if(target && target.player === turn) {
                selected = {r, c};
                moves = getValidMoves(r, c, target);
            } else {
                selected = null; moves = [];
            }
            render();
        }

        function getValidMoves(r, c, piece) {
            let possible = [];
            const d = piece.player === 1 ? -1 : 1;

            if(piece.type === 'p') {
                // Forward
                if(!board[r+d][c]) {
                    possible.push({r: r+d, c: c});
                    // Double step
                    let startRow = piece.player === 1 ? 6 : 1;
                    if(r === startRow && !board[r+2*d][c]) possible.push({r: r+2*d, c: c});
                }
                // Captures
                [c-1, c+1].forEach(nc => {
                    if(nc>=0 && nc<8 && board[r+d][nc] && board[r+d][nc].player !== piece.player) 
                        possible.push({r: r+d, c: nc});
                });
            }

            if(piece.type === 'n') {
                const jumps = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
                jumps.forEach(j => {
                    let nr = r+j[0], nc = c+j[1];
                    if(nr>=0 && nr<8 && nc>=0 && nc<8) {
                        if(!board[nr][nc] || board[nr][nc].player !== piece.player) possible.push({r: nr, c: nc});
                    }
                });
            }

            if(['r','b','q'].includes(piece.type)) {
                let dirs = [];
                if(piece.type === 'r' || piece.type === 'q') dirs.push([0,1],[0,-1],[1,0],[-1,0]);
                if(piece.type === 'b' || piece.type === 'q') dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
                
                dirs.forEach(dir => {
                    let nr = r + dir[0], nc = c + dir[1];
                    while(nr>=0 && nr<8 && nc>=0 && nc<8) {
                        if(!board[nr][nc]) { possible.push({r: nr, c: nc}); }
                        else {
                            if(board[nr][nc].player !== piece.player) possible.push({r: nr, c: nc});
                            break;
                        }
                        nr += dir[0]; nc += dir[1];
                    }
                });
            }

            if(piece.type === 'k') {
                for(let i=-1; i<=1; i++) {
                    for(let j=-1; j<=1; j++) {
                        let nr = r+i, nc = c+j;
                        if(nr>=0 && nr<8 && nc>=0 && nc<8 && (i!==0 || j!==0)) {
                            if(!board[nr][nc] || board[nr][nc].player !== piece.player) possible.push({r: nr, c: nc});
                        }
                    }
                }
            }
            return possible;
        }

        function askQuestion() {
            const q = QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
            document.getElementById('q-text').innerText = q.q;
            const cBox = document.getElementById('choices');
            cBox.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            
            q.c.forEach((choice, i) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice;
                btn.onclick = () => {
                    if(i === q.a) {
                        document.getElementById('feedback').innerText = "✅ Correct!";
                        document.getElementById('feedback').style.color = "green";
                        setTimeout(() => { closeQ(); execute(); }, 800);
                    } else {
                        document.getElementById('feedback').innerText = "❌ Wrong! Turn Skipped.";
                        document.getElementById('feedback').style.color = "red";
                        setTimeout(() => { closeQ(); nextTurn(); }, 1200);
                    }
                };
                cBox.appendChild(btn);
            });
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function execute() {
            const targetPiece = board[pending.to.r][pending.to.c];
            board[pending.to.r][pending.to.c] = board[pending.from.r][pending.from.c];
            board[pending.from.r][pending.from.c] = null;
            
            if(targetPiece && targetPiece.type === 'k') {
                alert(`Game Over! Player ${turn} wins by capturing the King!`);
                initGame();
            } else {
                nextTurn();
            }
        }

        function nextTurn() {
            turn = turn === 1 ? 2 : 1;
            selected = null; moves = [];
            updateUI(); render();
        }

        function updateUI() {
            const td = document.getElementById('turn-display');
            td.innerText = turn === 1 ? "White's Turn" : "Black's Turn";
            td.className = `turn-box ${turn === 1 ? 'white-turn' : 'black-turn'}`;
        }

        function closeQ() { document.getElementById('modal-overlay').style.display = 'none'; }

        initGame();
    </script>
</body>
</html>
